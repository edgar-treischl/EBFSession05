### Odds Ratios (OR) 


&lt;p style="font-size:120%;"&gt;OR drücken ein Chancenverhältnis aus und werden häufig berichtet wenn das Outcome der Forschungsfrage binär vorliegt. Zur Illustration gehen wir jedoch einer anderen Forschungsfrage nach.&lt;/p&gt; 

&lt;p style="font-size:120%;"&gt;Formal ausgedrückt: Das Chancenverhältnis (Odds-Ratio) ist somit definiert als Quotient aus der Chance, dass ein bestimmtes Ereignis in einer Gruppe eintritt und der Chance, dass dieses Ereignis in einer anderen Gruppe eintritt. &lt;/p&gt; 


&lt;p style="font-size:120%;"&gt;Beispiel: War die Chance den Untergang der Titanic zu überleben (Outcome: 0=nicht überlebt; 1 überlebt) für Frauen größer als für Männer?&lt;/p&gt; 


---
class: middle, center


### Let's be brave

&lt;p style="font-size:120%;"&gt;Das Chancenverhältnis die Titanic überlebt zu haben kann zur Illustration per Hand ☠ berechnen werden &lt;/p&gt; 


---


## Odds Ratio per Hand berechnen ☠

![](05_EBF_files/figure-html/unnamed-chunk-5-1.png)&lt;!-- --&gt;

- Odds der Männer die Titanic zu überleben (109 / 468) *geteilt durch* die Odds der Frauen (233 / 81)




---

## Odds Ratio per Hand berechnen ☠



```r
#Odds der Männer zu überleben: 
109 / 468
```

```
## [1] 0.232906
```


```r
#Odds der Frauen zu überleben: 
233 / 81
```

```
## [1] 2.876543
```


```r
#OR von Männer gegenüber Frauen zu überleben: 
0.232906 / 2.876543
```

```
## [1] 0.08096733
```


---


## Vgl. Ergebnis einer logistischen Regression


```r
results_titanic
```

```
## (Intercept)     Sexmale 
##  2.87654321  0.08096732
```

- **Interpretation**: Männer haben gegenüber Frauen eine um den Faktor 0.08 geringere Chance den Untergang der Titanic zu überleben.


- **Merke**: Odds Ratio ist keine Wahrscheinlichkeit, sondern ein Wahrscheinlichkeitsverhältnis

- **Interpretation**:
  - OR = 1: Kein Effekt
  - OR &gt; 1: positiver Effekt 
  - 0 &lt; OR &lt; 1: negativer Effekt

# 3. Im Zeitverlauf

## Bildungsexpansion

### - Reform und Ausdehnung des sekundären und tertiären Bildungswesens

### - Hoffnung: Abbau sozialer Ungleichheit in der Bildungsbeteiligung und Erhöhung gesellschaftlicher Durchlässigkeit 


---

## Empirische Befunde

### - Deutliche Niveaueffekte: Quantitative Zunahme der Bildungsbeteiligung

### - Geringe Struktureffekte: Deutlicher Zusammenhang von Schichtzugehörigkeit und Schulbesuch (Fahrstuhleffekt)
